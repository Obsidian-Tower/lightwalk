<!DOCTYPE html>
<html>
<head>
  <title>Ocala Parcel Mapper (Full + Fixed Drawing)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      position: fixed;
      width: 100%;
      font-family: sans-serif;
    }

    #map {
      position:absolute;
      top:0;
      left:0;
      height:100%;
      width:100%;
    }

    #drawOverlay {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:5;
      pointer-events:none;
      cursor:crosshair;
    }

    .controls {
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      z-index:10;
      background:rgba(0,0,0,0.85);
      padding:12px;
      border-radius:10px;
      color:white;
      display:flex;
      gap:10px;
    }

    button {
      padding:10px 16px;
      background:#2563eb;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .active-draw {
      background:#16a34a !important;
    }

    .layer-panel {
      position:absolute;
      bottom:10px;
      right:10px;
      z-index:10;
      background:rgba(0,0,0,0.9);
      color:white;
      padding:12px;
      border-radius:10px;
      max-height:300px;
      overflow:auto;
      min-width:180px;
    }

    .layer-item {
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
    }

    .color-box {
      width:12px;
      height:12px;
      border-radius:3px;
    }

    /* 🔥 Toggle bottom-left + smaller */
    #uiToggleWrapper {
      position:absolute;
      bottom:12px;
      left:12px;
      z-index:9999;
      transform: scale(1);
      transform-origin: bottom left;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 52px;
      height: 28px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #444;
      border-radius: 34px;
      transition: 0.3s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 22px;
      width: 22px;
      left: 3px;
      top: 3px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background-color: #16a34a;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    .ui-group {
      transition: opacity 0.25s ease;
    }
  </style>
</head>

<body>

<div id="map"></div>
<div id="drawOverlay"></div>

<!-- 🔥 Toggle -->
<div id="uiToggleWrapper">
  <label class="switch">
    <input type="checkbox" id="uiToggle" checked>
    <span class="slider"></span>
  </label>
</div>

<div class="controls ui-group">
  <button id="drawBtn" onclick="startDrawing()">Tap to Draw</button>
  <button onclick="finishDrawing()">Finish Polygon</button>
  <button onclick="clearAll()">Clear All</button>
  <button onclick="toggleClustering()" id="clusterBtn">Clustering: ON</button>
</div>

<div class="layer-panel ui-group">
  <b>Areas</b>
  <div id="layerList"></div>
</div>

<script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

<script>
const STATUS_COLORS = {
  "prospect": "#facc15",        // yellow
  "knocked": "#a855f7",         // purple
  "not interested": "#06b7d6",  // cyan
  "follow up": "#0419ba",       // dark blue
  "sold": "#08a112",             // dark green
  "installed":"#07ed0f"
};  
let CURRENT_USER = null;
let map;
let drawing = false;
let currentPath = [];
let currentPolyline = null;
let ACTIVE_POLYGONS = new Set();
let polygons = [];
let clusteringEnabled = true;
let activeInfoWindow = null;

function getUserFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("user");
}

async function fetchActivePolygons() {
  try {
    const res = await fetch(`https://lightwalk.coryzuber.workers.dev/get-active-polygons?user=${CURRENT_USER}`);
    const data = await res.json();

    if (!res.ok) {
      console.error("Failed to fetch active polygons:", data);
      return;
    }

    // 🔥 expect: [1,2,3]
    ACTIVE_POLYGONS = new Set(data.active_polygons || []);

    console.log("✅ Active polygons:", ACTIVE_POLYGONS);

  } catch (err) {
    console.error("❌ fetchActivePolygons error:", err);
  }
}

function applyActiveStateToUI() {
  polygons.forEach(polyObj => {
    const isActive = ACTIVE_POLYGONS.has(polyObj.id);
    if (isActive && polyObj.markers.length === 0) {
      fetchParcelsForPolygon(polyObj);
    }
    // 🔥 set visibility
    polyObj.visible = isActive;
    polyObj.polygon.setMap(isActive ? map : null);

    if (clusteringEnabled) {
      polyObj.clusterer?.setMap(isActive ? map : null);
    } else {
      polyObj.markers.forEach(m => m.setMap(isActive ? map : null));
    }

    // 🔥 update checkbox UI
    const checkboxes = document.querySelectorAll("#layerList input[type='checkbox']");

    checkboxes.forEach(cb => {
      const id = Number(cb.dataset.id);
      cb.checked = ACTIVE_POLYGONS.has(id);
    });
  });
}

async function updateActivePolygons() {
  try {
    const list = Array.from(ACTIVE_POLYGONS);

    await fetch("https://lightwalk.coryzuber.workers.dev/update-active-polygons", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user: CURRENT_USER,
        active_polygons: list
      })
    });

    console.log("✅ Active polygons updated:", list);

  } catch (err) {
    console.error("❌ updateActivePolygons error:", err);
  }
}

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 29.187, lng: -82.140 },
    zoom: 16,
    gestureHandling: "greedy",
    styles: [
      { featureType: "poi", stylers: [{ visibility: "off" }] },
      { featureType: "transit", stylers: [{ visibility: "off" }] }
    ]
  });

  // 🔥 ADD THIS LINE
  getUserLocation();

  map.addListener("click", () => {
    if (activeInfoWindow) {
      activeInfoWindow.close();
      activeInfoWindow = null;
    }
  });
}

async function savePolygonToBackend(path) {
  try {
    const coords = path.map(p => [p.lat(), p.lng()]);

    const res = await fetch("https://lightwalk.coryzuber.workers.dev/save-polygon", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user: CURRENT_USER,
        coords
      })
    });

    const data = await res.json();

    if (!res.ok) {
      console.error("❌ Save failed:", data);
      return null;
    }

    console.log("✅ Polygon saved:", data);
    return data;

  } catch (err) {
    console.error("❌ Network error:", err);
    return null;
  }
}

function showUserSelectionModal() {
  const overlay = document.createElement("div");
  overlay.style.position = "fixed";
  overlay.style.top = "0";
  overlay.style.left = "0";
  overlay.style.width = "100%";
  overlay.style.height = "100%";
  overlay.style.background = "rgba(0,0,0,0.85)";
  overlay.style.display = "flex";
  overlay.style.alignItems = "center";
  overlay.style.justifyContent = "center";
  overlay.style.zIndex = "99999";

  const box = document.createElement("div");
  box.style.background = "#111";
  box.style.padding = "30px";
  box.style.borderRadius = "12px";
  box.style.textAlign = "center";
  box.style.color = "white";
  box.style.minWidth = "250px";

  const title = document.createElement("div");
  title.textContent = "Select User";
  title.style.marginBottom = "20px";
  title.style.fontSize = "18px";
  title.style.fontWeight = "600";

  box.appendChild(title);

  const users = ["Cory", "James", "Caleb", "Edward"];

  users.forEach(user => {
    const btn = document.createElement("button");

    btn.textContent = user;
    btn.style.display = "block";
    btn.style.width = "100%";
    btn.style.marginBottom = "10px";
    btn.style.padding = "10px";
    btn.style.borderRadius = "8px";
    btn.style.border = "none";
    btn.style.cursor = "pointer";
    btn.style.background = "#2563eb";
    btn.style.color = "white";

    btn.onclick = () => {
      const url = new URL(window.location.href);
      url.searchParams.set("user", user);

      // 🔥 redirect to same page with user param
      window.location.href = url.toString();
    };

    box.appendChild(btn);
  });

  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

function screenToLatLng(x, y) {
  const projection = map.getProjection();
  const bounds = map.getBounds();
  const topRight = projection.fromLatLngToPoint(bounds.getNorthEast());
  const bottomLeft = projection.fromLatLngToPoint(bounds.getSouthWest());
  const scale = Math.pow(2, map.getZoom());

  const worldPoint = new google.maps.Point(
    x / scale + bottomLeft.x,
    y / scale + topRight.y
  );

  return projection.fromPointToLatLng(worldPoint);
}

function startDrawing() {
  drawing = true;
  currentPath = [];

  document.getElementById("drawBtn").classList.add("active-draw");

  const overlay = document.getElementById("drawOverlay");
  overlay.style.pointerEvents = "auto";

  if (currentPolyline) currentPolyline.setMap(null);

  currentPolyline = new google.maps.Polyline({
    path: currentPath,
    map: map,
    strokeColor: "#ff0000",
    strokeWeight: 4
  });

  overlay.onmousedown = (e) => {
    // 🔥 always close popup on empty click
    if (activeInfoWindow) {
      activeInfoWindow.close();
      activeInfoWindow = null;
    }

    if (!drawing) return;

    addPoint(screenToLatLng(e.clientX, e.clientY));
  };

  overlay.onmousemove = (e) => {
    if (!drawing || currentPath.length === 0) return;
    currentPolyline.setPath([...currentPath, screenToLatLng(e.clientX, e.clientY)]);
  };
}

async function finishDrawing() {
  if (!drawing || currentPath.length < 3) return;

  drawing = false;

  document.getElementById("drawBtn").classList.remove("active-draw");
  document.getElementById("drawOverlay").style.pointerEvents = "none";

  const color = getRandomColor();

  const polygon = new google.maps.Polygon({
    paths: currentPath,
    strokeColor: color,
    fillColor: color,
    fillOpacity: 0.2,
    strokeWeight: 2,
    map: map
  });

  polygon.addListener("click", () => {
    if (activeInfoWindow) {
      activeInfoWindow.close();
      activeInfoWindow = null;
    }
  });

  // 🔥 STEP 1: SAVE TO BACKEND
  const result = await savePolygonToBackend(currentPath);

  if (!result) {
    console.warn("Polygon not saved, aborting");
    return;
  }

  // 🔥 STEP 2: USE DB ID AS AREA NAME
  const polyObj = {
    id: result.id, // <-- comes from DB
    polygon,
    path: [...currentPath],
    markers: [],
    clusterer: null,
    color,
    visible: true
  };

  polygons.push(polyObj);

  if (currentPolyline) currentPolyline.setMap(null);

  // 🔥 STEP 3: NOW UI + GIS
  addLayerUI(polyObj);
}

function addPoint(latLng) {
  currentPath.push(latLng);
  currentPolyline.setPath(currentPath);
  // 🔴 draw vertex dot
  new google.maps.Marker({
    position: latLng,
    map: map,
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 4, // match strokeWeight (4)
      fillColor: "#ff0000",
      fillOpacity: 1,
      strokeWeight: 0
    }
  });
}

function addLayerUI(polyObj) {
  const list = document.getElementById("layerList");

  const item = document.createElement("div");
  item.className = "layer-item";

  const checkbox = document.createElement("input");
  checkbox.type = "checkbox";
  checkbox.checked = true;
  checkbox.dataset.id = polyObj.id;
  const colorBox = document.createElement("div");
  colorBox.className = "color-box";
  colorBox.style.background = polyObj.color;

  const label = document.createElement("span");
  label.textContent = `area-${polyObj.id}`;

  checkbox.checked = ACTIVE_POLYGONS.has(polyObj.id);

  checkbox.addEventListener("change", () => {
    const visible = checkbox.checked;

    // 🔥 update UI visibility
    polyObj.visible = visible;
    polyObj.polygon.setMap(visible ? map : null);

    if (clusteringEnabled) {
      polyObj.clusterer?.setMap(visible ? map : null);
    } else {
      polyObj.markers.forEach(m => m.setMap(visible ? map : null));
    }

    // 🔥 update active set
    if (visible) {
      ACTIVE_POLYGONS.add(polyObj.id);
    } else {
      ACTIVE_POLYGONS.delete(polyObj.id);
    }

    // 🔥 send full list to backend
    updateActivePolygons();
  });

  item.appendChild(checkbox);
  item.appendChild(colorBox);
  item.appendChild(label);
  list.appendChild(item);
}

async function fetchParcelsForPolygon(polyObj) {
  const coords = polyObj.path.map(p => [p.lng(), p.lat()]);
  coords.push(coords[0]);

  const geometry = {
    rings: [coords],
    spatialReference: { wkid: 4326 }
  };

  const url = "https://gis.ocalafl.org/arcgis/rest/services/Public/Parcels/MapServer/0/query";

  const params = new URLSearchParams({
    f: "json",
    geometry: JSON.stringify(geometry),
    geometryType: "esriGeometryPolygon",
    spatialRel: "esriSpatialRelIntersects",
    outFields: "*",
    returnGeometry: "false"
  });

  const res = await fetch(url + "?" + params.toString());
  const json = await res.json();

  const parcelIds = [];
  const parcelData = [];

  json.features.forEach(f => {
    const a = f.attributes;

    if (!a.INSIDE_Y || !a.INSIDE_X) return;
    if (!a.alt_key) {
      console.warn("Missing alt_key for parcel:", a);
      return;
    }
    if (!a.alt_key) return;

    parcelIds.push(a.alt_key);

    parcelData.push({
      parcel_id: a.alt_key,
      lat: a.INSIDE_Y,
      lng: a.INSIDE_X,
      address: a.situs_1 || "",
      city: a.add_3 || "",
      owner: a.name || ""
    });
  });

  // 🔥 send to backend (unchanged)
  await sendParcelsToBackend(parcelIds);

  // 🔥 fetch statuses BEFORE creating markers
  const statuses = await fetchCurrentParcelStatuses(parcelIds);

  // 🔥 CREATE markers with correct colors immediately
  createMarkersWithStatuses(polyObj, parcelData, statuses);
}

function applyClustering(polyObj) {
  if (polyObj.clusterer) polyObj.clusterer.setMap(null);

  if (clusteringEnabled) {
    polyObj.markers.forEach(m => m.setMap(null));
    polyObj.clusterer = new markerClusterer.MarkerClusterer({
      map: map,
      markers: polyObj.markers
    });
  } else {
    polyObj.markers.forEach(m => {
      if (polyObj.visible) m.setMap(map);
    });
  }
}

function toggleClustering() {
  clusteringEnabled = !clusteringEnabled;

  document.getElementById("clusterBtn").textContent =
    `Clustering: ${clusteringEnabled ? "ON" : "OFF"}`;

  polygons.forEach(applyClustering);
}

function clearAll() {
  polygons.forEach(p => {
    p.polygon.setMap(null);
    p.clusterer?.setMap(null);
    p.markers.forEach(m => m.setMap(null));
  });

  polygons = [];
  document.getElementById("layerList").innerHTML = "";
}

function applyStatusesToMarkers(polyObj, statuses) {
  const statusMap = {};

  statuses.forEach(s => {
    statusMap[s.parcel_id] = {
      status: s.status,
      created_at: s.created_at
    };
  });

  polyObj.markers.forEach(marker => {
    const statusObj = statusMap[marker.parcel_id];
    if (!statusObj) return;

    const status = statusObj.status;
    const created_at = statusObj.created_at;

    // 🔥 update marker state
    marker.current_status = status;
    marker.created_at = created_at;

    // 🔥 update marker color
    marker.setIcon({
      path: google.maps.SymbolPath.CIRCLE,
      scale: 15,
      fillColor: STATUS_COLORS[status],
      fillOpacity: 1,
      strokeWeight: 1,
      strokeColor: "#000"
    });
  });
}

function getRandomColor() {
  const colors = ["#ef4444","#22c55e","#3b82f6","#f59e0b","#a855f7","#14b8a6"];
  return colors[Math.floor(Math.random() * colors.length)];
}

document.getElementById("uiToggle").addEventListener("change", (e) => {
  const visible = e.target.checked;

  document.querySelectorAll(".ui-group").forEach(el => {
    el.style.opacity = visible ? "1" : "0";
    el.style.pointerEvents = visible ? "auto" : "none";
  });
});
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBGFCA70J_CRFo-FxwoSpN3ZjpMicNeVfM&callback=initMap">
</script>

<script>

function getUserLocation() {
  if (!navigator.geolocation) {
    console.warn("Geolocation not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (position) => {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;

      console.log("📍 User Location:", lat, lng);

      const userLatLng = { lat, lng };

      // 🔥 center map on user
      map.setCenter(userLatLng);

      // 🔥 add marker
      new google.maps.Marker({
        position: userLatLng,
        map: map,
        title: "You are here",
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 2,
          fillColor: "#0000ff",
          fillOpacity: .6,
          strokeWeight: 2,
          strokeColor: "#000"
        }
      });
    },
    (error) => {
      console.error("Geolocation error:", error);
    },
    {
      enableHighAccuracy: true
    }
  );
}

async function sendParcelsToBackend(parcelIds) {
  const CHUNK_SIZE = 80;

  for (let i = 0; i < parcelIds.length; i += CHUNK_SIZE) {
    const chunk = parcelIds.slice(i, i + CHUNK_SIZE);

    try {
      await fetch("https://lightwalk.coryzuber.workers.dev/init-parcels", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          parcel_ids: chunk
        })
      });
    } catch (err) {
      console.error("Failed to send chunk", err);
    }
  }
}
async function fetchCurrentParcelStatuses(parcelIds) {
  const CHUNK_SIZE = 80; // safe under SQLite limit
  let allResults = [];

  for (let i = 0; i < parcelIds.length; i += CHUNK_SIZE) {
    const chunk = parcelIds.slice(i, i + CHUNK_SIZE);

    try {
      const res = await fetch("https://lightwalk.coryzuber.workers.dev/get-current-parcels", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          parcel_ids: chunk
        })
      });

      const data = await res.json();

      if (!Array.isArray(data)) {
        console.error("Invalid chunk response:", data);
        continue;
      }

      allResults = allResults.concat(data);

    } catch (err) {
      console.error("Chunk fetch failed:", err);
    }
  }

  return allResults;
}
function createMarkersWithStatuses(polyObj, parcelData, statuses) {

  if (!Array.isArray(statuses)) {
    console.warn("Statuses not array, defaulting to empty");
    statuses = [];
  }

  const statusMap = {};

  // 🔥 build full object map (status + timestamp)
  statuses.forEach(s => {
    statusMap[s.parcel_id] = {
      status: s.status,
      created_at: s.created_at
    };
  });

  polyObj.markers = [];

  parcelData.forEach(p => {

    // 🔥 get full object (fallback safe)
    const statusObj = statusMap[p.parcel_id] || {
      status: "prospect",
      created_at: null
    };

    const status = statusObj.status;
    const created_at = statusObj.created_at;

    const color = STATUS_COLORS[status] || "#6b7280";

    const marker = new google.maps.Marker({
      position: { lat: p.lat, lng: p.lng },
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 15,
        fillColor: color,
        fillOpacity: 1,
        strokeWeight: 1,
        strokeColor: "#000"
      }
    });

    // 🔥 attach ALL needed data to marker
    marker.parcel_id = p.parcel_id;
    marker.current_status = status;
    marker.created_at = created_at;

    attachMarkerPopup(marker, p);

    polyObj.markers.push(marker);
  });

  applyClustering(polyObj); // 🔥 REQUIRED
}

async function fetchAllPolygons() {
  try {
    const res = await fetch("https://lightwalk.coryzuber.workers.dev/get-polygons");
    const data = await res.json();

    if (!res.ok) {
      console.error("❌ Failed to fetch polygons:", data);
      return;
    }

    console.log("✅ ALL POLYGONS:", data);

    data.forEach(row => {
      const color = getRandomColor();

      const path = row.coords.map(([lat, lng]) => ({
        lat,
        lng
      }));

      const polygon = new google.maps.Polygon({
        paths: path,
        strokeColor: color,
        fillColor: color,
        fillOpacity: 0.2,
        strokeWeight: 2,
        map: map
      });

      const polyObj = {
        id: row.id,
        polygon,
        path,
        markers: [],
        clusterer: null,
        color,
        visible: true
      };

      polygons.push(polyObj);

      // 🔥 THIS populates the "Areas" list
      addLayerUI(polyObj);
    });

  } catch (err) {
    console.error("❌ fetchAllPolygons error:", err);
  }
}

function attachMarkerPopup(marker, data) {
  marker.addListener("click", () => {
    if (activeInfoWindow) activeInfoWindow.close();

    const container = document.createElement("div");
    container.style.minWidth = "220px";
    container.style.fontSize = "14px";
    container.innerHTML = `
      <div style="font-size:16px;font-weight:600;">
        ${data.address}
      </div>

      <div>${data.city}</div>

      <div style="margin-top:6px;">
        Owner: ${data.owner}
      </div>
    `;

    const btnWrap = document.createElement("div");
    btnWrap.style.display = "flex";
    btnWrap.style.flexWrap = "wrap";
    btnWrap.style.gap = "6px";

    Object.keys(STATUS_COLORS).forEach(status => {
      const btn = document.createElement("button");

      btn.textContent = status;
      btn.style.padding = "6px 8px";
      btn.style.border = "none";
      btn.style.borderRadius = "6px";
      btn.style.cursor = "pointer";
      btn.style.fontSize = "14px";
      btn.style.color = "white";
      btn.style.background = STATUS_COLORS[status];

      if (marker.current_status === status) {
        btn.style.outline = "2px solid white";
      }

      btn.onclick = async () => {
        if (marker.current_status === status) return;

        try {
          // 🔥 send update to backend
          const res = await updateParcelStatus(marker.parcel_id, status);

          if (!res?.parcel) return;

          const updated = [res.parcel];

          // 🔥 apply ONLY backend truth
          applyStatusesToMarkers({ markers: [marker] }, updated);
          // 🔥 update status text in popup
          const statusText = container.querySelector("#statusText");
          if (statusText && updated[0]?.status) {
            statusText.textContent = updated[0].status;
            statusText.style.color = STATUS_COLORS[updated[0].status];
          }

          // 🔥 update timestamp
          const metaTime = container.querySelector("#metaTime");
          if (metaTime && updated[0]?.created_at) {
            metaTime.textContent = new Date(updated[0].created_at).toLocaleString();
          }
          // 🔥 update button highlight AFTER backend confirms
          btnWrap.querySelectorAll("button").forEach(b => b.style.outline = "none");

          const confirmedStatus = updated[0]?.status;
          if (confirmedStatus) {
            const correctBtn = [...btnWrap.children].find(b => b.textContent === confirmedStatus);
            if (correctBtn) correctBtn.style.outline = "2px solid white";
          }

        } catch (err) {
          console.error("Update failed:", err);
        }
      };

      btnWrap.appendChild(btn);
    });

    container.appendChild(btnWrap);

    const meta = document.createElement("div");
    meta.style.marginTop = "10px";
    meta.style.fontSize = "12px";
    meta.style.opacity = "0.85";

    meta.innerHTML = `
      <div><b>Parcel ID:</b> ${marker.parcel_id}</div>
      <div>
        <b>Last Updated:</b> 
        <span id="metaTime">
          ${marker.created_at ? new Date(marker.created_at).toLocaleString() : "unknown"}
        </span>
      </div>
    `;

container.appendChild(meta);

    activeInfoWindow = new google.maps.InfoWindow({
      content: container
    });

    activeInfoWindow.open(map, marker);
  });
}

async function updateParcelStatus(parcel_id, status) {
  if (!CURRENT_USER) {
    console.warn("No user selected");
    return;
  }

  try {
    const res = await fetch("https://lightwalk.coryzuber.workers.dev/update-parcel-status", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        parcel_id,
        status,
        user: CURRENT_USER
      })
    });

    const data = await res.json();

    if (!res.ok) {
      console.error("Worker error:", data);
      return;
    }

    return data; // 🔥 THIS is the key

  } catch (err) {
    console.error("❌ Failed to update parcel status:", err);
  }
}

  // 🔥 STEP 1: load ALL polygons first
  fetchAllPolygons().then(() => {

    // 🔥 STEP 2: then load active state
    fetchActivePolygons().then(() => {

      // 🔥 STEP 3: apply active state to UI
      applyActiveStateToUI();

    });

  });

} else {
  showUserSelectionModal();
}
